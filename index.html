<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-[#FF3131] ">
    <h1 class="flex justify-center text-[48px] text-[#FFFFFF]">Criar Conta</h1>
    <div class="flex flex-row items-center justify-center">
        <img src="img/facebook-icon.svg" alt="">
        <img src="img/google-icon.svg" alt="">
        <img src="img/linkind-icon.svg" alt="">
    </div>
    <p class="text-[#FFFFFF] flex justify-center">ou cadastre seu email</p>
    <div class="flex justify-center">
        <div class="w-80 space-y-4">
            <input type="text" placeholder="Nome" class="w-full p-3  bg-[#F3F3F3]" />
            <input type="text" placeholder="Email" class="w-full p-3  bg-[#F3F3F3]" />
            <input type="text" placeholder="Senha" class="w-full p-3  bg-[#F3F3F3]" />
        </div>
    </div>
    <div class="flex justify-center w80">
        <div class="border-2 border-[#243c5a] rounded-xl ">Cadastrar</div>
    </div>



</body>

</html>
